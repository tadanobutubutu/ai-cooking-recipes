version: 2.1

jobs:
  on-pull-request:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Convert draft to ready-for-review for authorized AI agents
          command: |
            set +e

            PR_NUMBER=$(echo "$CIRCLE_PULL_REQUEST" | grep -oE '[0-9]+$')
            if [ -z "$PR_NUMBER" ]; then
              echo "No PR number found. Skipping."
              exit 0
            fi

            PR_DATA=$(curl -sf \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/pulls/$PR_NUMBER" || echo "{}")

            PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.user.login // "unknown"')
            PR_DRAFT=$(echo "$PR_DATA" | jq -r '.draft // "false"')

            echo "PR #$PR_NUMBER | Author: $PR_AUTHOR | Draft: $PR_DRAFT"

            ALLOWED_AUTHORS="google-labs-jules[bot] devin-ai-integration[bot]"

            if echo "$ALLOWED_AUTHORS" | grep -qF "$PR_AUTHOR"; then
              if [ "$PR_DRAFT" = "true" ]; then
                echo "Converting draft PR #$PR_NUMBER to ready-for-review..."
                HTTP_STATUS=$(curl -X PATCH -s -o /dev/null -w "%{http_code}" \
                  -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"draft": false}' \
                  "https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/pulls/$PR_NUMBER")
                echo "HTTP status: $HTTP_STATUS"
              else
                echo "PR is already ready-for-review. Mergify will handle merge."
              fi
            else
              echo "Author $PR_AUTHOR is not in allowed list. No action taken."
            fi

            exit 0

workflows:
  on-pull-request:
    jobs:
      - on-pull-request
