version: 2.1

jobs:
  instant-merge:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Instant Force Merge
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "Not a pull request. Skipping."
              exit 0
            fi

            PR_NUMBER=${CIRCLE_PULL_REQUEST##*/}
            echo "Processing PR #$PR_NUMBER..."

            # Install GitHub CLI
            if ! command -v gh &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y gh
            fi

            if [ -z "$GITHUB_TOKEN" ]; then
              echo "ERROR: GITHUB_TOKEN is not set in CircleCI. Please add it to project environment variables."
              exit 1
            fi

            export GH_TOKEN=$GITHUB_TOKEN

            # 1. Un-draft
            echo "Un-drafting PR #$PR_NUMBER..."
            gh pr ready "$PR_NUMBER" || echo "Note: Could not mark as ready (maybe already ready)"

            # 2. Approve
            echo "Approving PR #$PR_NUMBER..."
            gh pr review "$PR_NUMBER" --approve --body "✅ Auto-approved by CircleCI" || echo "Note: Could not approve"

            # 3. Merge with ALL flags possible to bypass blocks
            echo "Attempting to merge PR #$PR_NUMBER..."
            gh pr merge "$PR_NUMBER" --squash --delete-branch --admin --disable-auto || \
            gh pr merge "$PR_NUMBER" --squash --delete-branch --disable-auto || \
            echo "Final attempt at merge failed. Check if branch protections are too strict."

workflows:
  on-pull-request:
    jobs:
      - instant-merge
