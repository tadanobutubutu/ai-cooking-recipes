version: 2.1

jobs:
  on-pull-request:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Convert draft to ready if author is allowed
          command: |
            PR_NUMBER=$(echo "$CIRCLE_PULL_REQUEST" | grep -oE '[0-9]+$' || true)
            if [ -z "$PR_NUMBER" ]; then
              echo "No PR number, skipping."
              exit 0
            fi

            PR_DATA=$(curl -s \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/pulls/$PR_NUMBER")

            PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.user.login')
            PR_DRAFT=$(echo "$PR_DATA" | jq -r '.draft')

            echo "Author: $PR_AUTHOR / Draft: $PR_DRAFT"

            ALLOWED="google-labs-jules[bot] devin-ai-integration[bot]"
            if echo "$ALLOWED" | grep -qF "$PR_AUTHOR"; then
              if [ "$PR_DRAFT" = "true" ]; then
                echo "Converting draft to ready..."
                curl -X PATCH -s \
                  -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"draft": false}' \
                  "https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/pulls/$PR_NUMBER"
              else
                echo "PR is already ready. Mergify will handle the merge."
              fi
            else
              echo "Author not allowed: $PR_AUTHOR"
            fi

workflows:
  on-pull-request:
    jobs:
      - on-pull-request
