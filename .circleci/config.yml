version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: "Add automerge label if authorized"
          command: |
            # PR作成者を確認し、許可されたユーザーならラベルを付与
            AUTHOR=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pulls/${CIRCLE_PR_NUMBER} | jq -r .user.login)
            if [ "$AUTHOR" = "tadanobutubutu" ] || [ "$AUTHOR" = "devin-ai-integration[bot]" ] || [ "$AUTHOR" = "google-labs-jules[bot]" ]; then
              echo "Author is authorized. Adding automerge label..."
              curl -X POST -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues/${CIRCLE_PR_NUMBER}/labels \
                -d '{"labels":["automerge"]}'
            fi
      - run:
          name: "Dummy Build"
          command: echo "Build successful"

workflows:
  version: 2
  build_and_label:
    jobs:
      - build
