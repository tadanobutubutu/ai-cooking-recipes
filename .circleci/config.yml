version: 2.1

jobs:
  build_and_automerge:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: "Install GitHub CLI & jq"
          command: |
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh jq -y
      - run:
          name: "Fully Automated Merge (Self-Healing)"
          command: |
            # GITHUB_TOKENの存在確認
            if [ -z "$GITHUB_TOKEN" ]; then
              echo "Warning: GITHUB_TOKEN is not set in CircleCI environment variables. Skipping automerge."
              exit 0
            fi

            # PR番号の特定
            PR_NUMBER=$CIRCLE_PR_NUMBER
            if [ -z "$PR_NUMBER" ]; then
              echo "CIRCLE_PR_NUMBER is empty. Attempting to find PR for branch: $CIRCLE_BRANCH"
              # 少し待機してGitHub側のPR作成を待つ
              sleep 5
              PR_NUMBER=$(gh pr list --head "$CIRCLE_BRANCH" --json number -q '.[0].number')
            fi

            if [ -z "$PR_NUMBER" ]; then
              echo "No active Pull Request found for this branch. Skipping."
              exit 0
            fi

            echo "Target PR Number: $PR_NUMBER"

            # PR作者を確認
            AUTHOR=$(gh pr view $PR_NUMBER --json author -q '.author.login')
            echo "PR Author: $AUTHOR"
            
            # 許可された作者リスト
            if [[ "$AUTHOR" =~ ^(tadanobutubutu|devin-ai-integration\[bot\]|google-labs-jules\[bot\])$ ]]; then
              echo "Authorized author detected. Executing self-merge..."
              
              # ドラフト解除
              gh pr ready $PR_NUMBER || true
              
              # ラベル付与 (Kodiak/Mergify用)
              gh pr edit $PR_NUMBER --add-label "automerge" || true
              
              # 直接マージ実行 (スクワッシュ)
              # --autoフラグを使うことで、ステータスチェックの完了を待ってマージされるように予約できる
              gh pr merge $PR_NUMBER --squash --delete-branch --auto
              
              echo "Merge command issued successfully."
            else
              echo "Unauthorized author: $AUTHOR. Skipping automerge."
            fi

workflows:
  version: 2
  main_workflow:
    jobs:
      - build_and_automerge
