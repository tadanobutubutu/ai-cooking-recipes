version: 2.1

jobs:
  instant-merge:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Instant Force Merge
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "Not a pull request. Skipping."
              exit 0
            fi

            PR_NUMBER=${CIRCLE_PULL_REQUEST##*/}
            echo "Processing PR #$PR_NUMBER..."

            # Install GitHub CLI if not present
            if ! command -v gh &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y gh
            fi

            # Check PR author
            PR_AUTHOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
            echo "PR Author: $PR_AUTHOR"

            # Authorized AI agents
            ALLOWED_AUTHORS="google-labs-jules[bot] devin-ai-integration[bot] tadanobutubutu"

            if echo "$ALLOWED_AUTHORS" | grep -qF "$PR_AUTHOR"; then
              echo "Authorized agent detected. Starting force merge..."
              
              # 1. Mark as ready if draft
              gh pr ready "$PR_NUMBER" || echo "Already ready or failed to mark ready"
              
              # 2. Approve the PR
              gh pr review "$PR_NUMBER" --approve --body "✅ Auto-approved by CircleCI Force Merger" || echo "Failed to approve"
              
              # 3. Merge immediately (using admin rights if necessary)
              # Using --squash for clean history
              gh pr merge "$PR_NUMBER" --squash --delete-branch --admin || \
              gh pr merge "$PR_NUMBER" --squash --delete-branch || \
              echo "Merge failed, but I tried my best."
            else
              echo "Author $PR_AUTHOR is not in allowed list. Skipping."
            fi

workflows:
  on-pull-request:
    jobs:
      - instant-merge:
          filters:
            branches:
              ignore: main
