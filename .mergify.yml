pull_request_rules:
  - name: Automerge Jules PRs
    conditions:
      - author=google-labs-jules[bot]
      - base=main
      - -conflict
    actions:
      merge:
        method: squash
        commit_message_template: null
      delete_head_branch: {}

  - name: Automerge Devin PRs
    conditions:
      - author=devin-ai-integration[bot]
      - base=main
      - -conflict
    actions:
      merge:
        method: squash
      delete_head_branch: {}

  - name: Comment on unauthorized PRs
    conditions:
      - author!=google-labs-jules[bot]
      - author!=devin-ai-integration[bot]
    actions:
      comment:
        message: |
          👋 Thank you for your interest!
          This repository only accepts automated PRs from authorized AI agents.
          External PRs will not be merged automatically.
