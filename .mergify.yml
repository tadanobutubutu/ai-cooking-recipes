pull_request_rules:
  - name: 🚀 INSTANT MERGE (AI AGENTS)
    conditions:
      - author~=(google-labs-jules\[bot\]|devin-ai-integration\[bot\]|tadanobutubutu)
      - -conflict
    actions:
      review:
        type: APPROVE
        message: "✅ AUTO-APPROVED"
      merge:
        method: squash
        commit_message_template: "Merged by Mergify: {{ title }}"
      delete_head_branch: {}

  - name: 🔓 AUTOMATIC READY-FOR-REVIEW
    conditions:
      - author~=(google-labs-jules\[bot\]|devin-ai-integration\[bot\]|tadanobutubutu)
      - draft
    actions:
      comment:
        message: "This PR is in draft. Mergify will merge it as soon as it becomes ready."
