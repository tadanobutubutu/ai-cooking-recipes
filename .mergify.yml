pull_request_rules:
  - name: 🤖 AUTOMATIC UN-DRAFT & MERGE FOR TRUSTED USERS
    conditions:
      - author~=(google-labs-jules|devin-ai-integration|tadanobutubutu)
      - -conflict
    actions:
      un-draft: {}
      review:
        type: APPROVE
        message: "✅ Trusted author detected. Auto-approving for instant merge."
      merge:
        method: squash
        commit_message_template: "Merged by Mergify: {{ title }}"
      delete_head_branch: {}
