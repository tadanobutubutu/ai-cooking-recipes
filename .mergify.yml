queue_rules:
  - name: default
    merge_conditions: []

pull_request_rules:

  - name: 🤖 Force merge Jules PRs
    conditions:
      - author=google-labs-jules[bot]
      - -conflict
      - -draft
    actions:
      review:
        type: APPROVE
        message: "✅ Auto-approved by Mergify"
      merge:
        method: squash
      delete_head_branch: {}
      comment:
        message: "✅ Auto-merged by Mergify (Jules)"

  - name: 🤖 Force merge Devin PRs
    conditions:
      - author=devin-ai-integration[bot]
      - -conflict
      - -draft
    actions:
      review:
        type: APPROVE
        message: "✅ Auto-approved by Mergify"
      merge:
        method: squash
      delete_head_branch: {}
      comment:
        message: "✅ Auto-merged by Mergify (Devin)"

  - name: 💬 Block unauthorized PRs
    conditions:
      - author!=google-labs-jules[bot]
      - author!=devin-ai-integration[bot]
    actions:
      comment:
        message: |
          👋 このリポジトリは認可されたAIエージェントのPRのみ受け付けています。
