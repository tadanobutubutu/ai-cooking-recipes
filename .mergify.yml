pull_request_rules:
  - name: 1️⃣ UN-DRAFT AI PRS IMMEDIATELY
    conditions:
      - or:
        - author=google-labs-jules[bot]
        - author=devin-ai-integration[bot]
        - author=tadanobutubutu
      - draft
    actions:
      un-draft: {}

  - name: 2️⃣ AUTO-APPROVE AND LABEL
    conditions:
      - or:
        - author=google-labs-jules[bot]
        - author=devin-ai-integration[bot]
        - author=tadanobutubutu
      - -draft
    actions:
      review:
        type: APPROVE
        message: "✅ Mergify Auto-approval"
      label:
        add: ["automerge"]

  - name: 3️⃣ SQUASH MERGE (BYPASS WIP)
    conditions:
      - or:
        - author=google-labs-jules[bot]
        - author=devin-ai-integration[bot]
        - author=tadanobutubutu
      - -draft
      # CircleCIが成功していることだけを必須条件にする
      - check-success=ci/circleci: build
      - -conflict
    actions:
      merge:
        method: squash
      delete_head_branch: {}
