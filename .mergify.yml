pull_request_rules:
  - name: "Un-draft AI PRs"
    conditions:
      - author~=(google-labs-jules|devin-ai-integration|tadanobutubutu)
      - draft
    actions:
      un-draft: {}

  - name: "Label AI PRs for Automerge"
    conditions:
      - author~=(google-labs-jules|devin-ai-integration|tadanobutubutu)
      - -draft
      - -label=automerge
    actions:
      label:
        add: ["automerge"]
