queue_rules:
  - name: default
    merge_conditions: []

pull_request_rules:
  - name: 🤖 Auto-merge Jules PRs
    conditions:
      - author=google-labs-jules[bot]
      - -conflict
      - or:
        - check-success=wip
        - check-neutral=wip
        - check-skipped=wip
    actions:
      review:
        type: APPROVE
        message: "✅ Auto-approved by Mergify"
      merge:
        method: squash
      delete_head_branch: {}
      comment:
        message: "✅ Automatically merged by Mergify Bot"

  - name: 🤖 Auto-merge Devin PRs
    conditions:
      - author=devin-ai-integration[bot]
      - -conflict
      - or:
        - check-success=wip
        - check-neutral=wip
        - check-skipped=wip
    actions:
      review:
        type: APPROVE
        message: "✅ Auto-approved by Mergify"
      merge:
        method: squash
      delete_head_branch: {}
      comment:
        message: "✅ Automatically merged by Mergify Bot"

  - name: 💬 Comment on unauthorized PRs
    conditions:
      - author!=google-labs-jules[bot]
      - author!=devin-ai-integration[bot]
    actions:
      comment:
        message: |
          👋 このリポジトリは認可されたAIエージェントのPRのみ受け付けています。
