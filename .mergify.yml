pull_request_rules:
  - name: 🚀 ULTIMATE AUTO-MERGE (Draft -> Ready -> Merge)
    conditions:
      - author~=(google-labs-jules\[bot\]|devin-ai-integration\[bot\]|tadanobutubutu)
      - -conflict
    actions:
      un-draft: {}
      review:
        type: APPROVE
        message: "✅ Auto-approved by Mergify (Force Pass)"
      merge:
        method: squash
        commit_message_template: "Merged by Mergify: {{ title }}"
      delete_head_branch: {}
