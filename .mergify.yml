pull_request_rules:
  - name: 🚀 AUTOMATED RECIPE MERGE
    conditions:
      - or:
        - author=google-labs-jules[bot]
        - author=devin-ai-integration[bot]
        - author=tadanobutubutu
      - label=automerge
      - -conflict
    actions:
      un-draft: {}
      review:
        type: APPROVE
        message: "✅ Mergify Auto-approval"
      merge:
        method: squash
      delete_head_branch: {}
