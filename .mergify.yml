pull_request_rules:
  - name: 🚀 ULTIMATE FORCE MERGE
    conditions:
      - author~=(google-labs-jules\[bot\]|devin-ai-integration\[bot\]|tadanobutubutu)
      - -conflict
    actions:
      review:
        type: APPROVE
        message: "✅ AUTO-APPROVED"
      merge:
        method: squash
      delete_head_branch: {}
